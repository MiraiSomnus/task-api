openapi: 3.1.0
info:
  title: Task API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://task-api-service-03uk.onrender.com
    description: Production server
tags:
  - name: Tasks
    description: Task-related endpoints
  - name: Monitoring
    description: Operational endpoints, such as health checks
paths:
  /tasks:
    get:
      summary: List all tasks
      tags:
        - Tasks
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Create a new task
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request due to invalid data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - 'Title must be at least 3 characters'
  
  /tasks/{completed}:
    get:
      tags:
        - Tasks
      summary: Filtering task by completed
      description: Filters the lists of tasks by whether they are completed or not
      parameters:
        - $ref: '#/components/parameters/queryComplete'
      responses:
       '201':
          description: Task completedsuccessfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /health:
    get:
      summary: Health Check
      description: Returns the current status of the API. Used by Render to verify that the service is running.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        title:
          type: string
          example: Buy groceries
        completed:
          type: boolean
          example: false

  parameters:
    queryComplete:
      name: completed
      in: query
      required: false
      description: Filter task by completion status
      schema:
        type: string
        example: completed 

    querySearch:
      name: search
      in: query
      required: false 
      description: Filter task by matching title or completion status
      schema: 
        type: string
        example: example 

    querySort:
      name: sortBy
      in: query
      required: false
      description: Field to sort by (e.g., completed, title)
      schema:
        type: string
        example: title 
      
    queryOrder:
      name: order
      in: query
      required: false
      description: Sort order 
      schema:
        type: string
        enum: [asc,desc]
        example: desc   
    
    queryOffset:
      name: offset
      in: query
      required: false
      description: Number of tasks to skip
      schema:
        type: integer
        example: 0

    queryLimit:
      name: limit
      in: query
      required: false
      description: Number of tasks to  return per page
      schema:
        type: integer
        example: 10

